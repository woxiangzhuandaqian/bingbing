<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<title>🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
html, body { height: 100%; overflow: hidden; }

.page {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px; opacity: 0; transform: translateX(100%);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none; z-index: 1;
}
.page.active { opacity: 1; transform: translateX(0); pointer-events: auto; z-index: 10; }
.page.exit-left { opacity: 0; transform: translateX(-30%); }
.page:first-child { transform: none; }
.page:first-child.active { opacity: 1; transform: none; }

.bg-cream { background: var(--cream); }
.bg-chat { background: var(--cream); }
.bg-reveal { background: linear-gradient(135deg, var(--green-light) 0%, var(--cream) 100%); }

.emoji-big { font-size: 60px; margin-bottom: 30px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.opening-text { font-size: 22px; color: var(--text); text-align: center; line-height: 1.6; margin-bottom: 50px; font-weight: 500; }

/* 聊天 */
.chat-page { justify-content: flex-end; padding: 60px 16px 30px; }
.chat-container { width: 100%; max-width: 400px; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; overflow-y: auto; padding-bottom: 10px; }

.chat-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 16px; line-height: 1.5; margin-bottom: 10px; opacity: 0; transform: translateY(15px) scale(0.9); transition: all 0.4s cubic-bezier(0.68, -0.3, 0.265, 1.2); }
.chat-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
.bubble-left { align-self: flex-start; background: white; color: var(--text); border-bottom-left-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.bubble-right { align-self: flex-end; background: var(--green); color: white; border-bottom-right-radius: 6px; }

.typing-indicator { align-self: flex-start; background: white; border-radius: 18px; border-bottom-left-radius: 6px; padding: 14px 18px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: none; }
.typing-indicator.show { display: flex; gap: 4px; align-items: center; }
.typing-dot { width: 7px; height: 7px; background: #ccc; border-radius: 50%; animation: typingBounce 1.4s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

.reply-options { display: flex; flex-direction: column; gap: 8px; align-self: center; width: 70%; margin-top: 15px; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
.reply-options.show { opacity: 1; transform: translateY(0); }
.reply-btn { padding: 11px 18px; background: white; border: 2px solid #e0e0e0; border-radius: 20px; font-size: 15px; color: var(--text); cursor: pointer; transition: all 0.3s; text-align: center; }
.reply-btn:active { transform: scale(0.95); }
.reply-btn.wrong { animation: shake 0.4s ease; border-color: #ffcdd2; background: #fff5f5; }
.reply-btn.correct { border-color: var(--green); background: var(--green-light); color: var(--green-dark); font-weight: 600; }
.reply-btn.disabled { pointer-events: none; opacity: 0.5; }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-4px); } }

/* 揭晓 */
.reveal-photo { width: 200px; height: 200px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; background: var(--gray-light); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.reveal-photo img { width: 100%; height: 100%; object-fit: cover; }
.reveal-title { font-size: 20px; font-weight: 600; color: var(--green-dark); margin-bottom: 8px; }
.reveal-desc { font-size: 15px; color: var(--text-light); margin-bottom: 40px; }
.page.active .reveal-content { animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

.skip-btn { position: fixed; top: 20px; right: 20px; font-size: 14px; color: var(--gray); cursor: pointer; z-index: 100; padding: 8px 16px; background: rgba(255,255,255,0.8); border-radius: 16px; }
</style>
</head>
<body>

<div class="skip-btn" id="skip-btn" onclick="location.href='home.html'" style="display:none">跳过 ›</div>

<!-- 开场 -->
<div class="page bg-cream active" id="page-opening">
  <div class="emoji-big">🎁</div>
  <div class="opening-text">猜猜今天做了什么？</div>
  <button class="btn btn-primary" onclick="startChat()">来吧</button>
</div>

<!-- 聊天线索 -->
<div class="page bg-chat chat-page" id="page-chat">
  <div class="chat-container" id="chat-container">
    <div class="typing-indicator" id="typing">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
    <div class="reply-options" id="reply-options">
      <div class="reply-btn" onclick="handleReply(this, false)">🍵 原叶糯米酸奶</div>
      <div class="reply-btn" onclick="handleReply(this, false)">🥭 芒果糯米酸奶</div>
      <div class="reply-btn" onclick="handleReply(this, true)">🥒 黄瓜冰浆</div>
    </div>
  </div>
</div>

<!-- 揭晓 -->
<div class="page bg-reveal" id="page-reveal">
  <div class="reveal-content">
    <div class="reveal-photo">
      <img src="" onerror="this.parentElement.innerHTML='<div style=color:#ccc;font-size:14px;text-align:center;padding:20px>拍好照片后<br>替换 src</div>'" alt="黄瓜冰浆">
    </div>
    <div class="reveal-title">黄瓜冰浆 · 布丁升级版</div>
    <div class="reveal-desc">黄瓜的清香，冰沙的口感，小布丁的甜味</div>
    <button class="btn btn-primary" onclick="enterHome()">进入专属小馆 →</button>
  </div>
</div>

<script src="app.js?v=2"></script>
<script>
const chatMessages = [
  { text: '给你几个线索哦 😏', delay: 600 },
  { text: '🟢 它是绿色的', delay: 1200 },
  { text: '🧊 冰冰凉凉的', delay: 1000 },
  { text: '💭 之前做过，但不太甜', delay: 1200 },
  { text: '这次我偷偷改良了~', delay: 1000 },
  { text: '你猜猜是什么？👇', delay: 800 },
];

let quizAnswered = false;

if (Store.get('played', false)) {
  location.href = 'menu.html';
}

function startChat() {
  document.getElementById('page-opening').classList.remove('active');
  document.getElementById('page-opening').classList.add('exit-left');
  document.getElementById('page-chat').classList.add('active');
  playMessages();
}

function playMessages() {
  const container = document.getElementById('chat-container');
  const typing = document.getElementById('typing');
  const options = document.getElementById('reply-options');
  let totalDelay = 300;

  chatMessages.forEach((msg) => {
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble bubble-left';
    bubble.textContent = msg.text;

    setTimeout(() => { typing.classList.add('show'); container.insertBefore(typing, options); container.scrollTop = container.scrollHeight; }, totalDelay);
    totalDelay += 800;
    setTimeout(() => { typing.classList.remove('show'); container.insertBefore(bubble, options); requestAnimationFrame(() => bubble.classList.add('show')); container.scrollTop = container.scrollHeight; }, totalDelay);
    totalDelay += msg.delay;
  });

  setTimeout(() => { options.classList.add('show'); container.scrollTop = container.scrollHeight; }, totalDelay + 200);
}

function handleReply(el, isCorrect) {
  if (quizAnswered) return;
  const container = document.getElementById('chat-container');
  const options = document.getElementById('reply-options');

  if (!isCorrect) {
    el.classList.add('wrong');
    setTimeout(() => el.classList.remove('wrong'), 400);
    const wrongBubble = document.createElement('div');
    wrongBubble.className = 'chat-bubble bubble-right';
    wrongBubble.textContent = el.textContent;
    container.insertBefore(wrongBubble, options);
    requestAnimationFrame(() => wrongBubble.classList.add('show'));
    setTimeout(() => {
      const nope = document.createElement('div');
      nope.className = 'chat-bubble bubble-left';
      nope.textContent = '不对哦~ 再想想 😜';
      container.insertBefore(nope, options);
      requestAnimationFrame(() => nope.classList.add('show'));
      container.scrollTop = container.scrollHeight;
    }, 500);
  } else {
    quizAnswered = true;
    const correctBubble = document.createElement('div');
    correctBubble.className = 'chat-bubble bubble-right';
    correctBubble.textContent = el.textContent;
    container.insertBefore(correctBubble, options);
    requestAnimationFrame(() => correctBubble.classList.add('show'));
    el.classList.add('correct');
    document.querySelectorAll('.reply-btn').forEach(b => b.classList.add('disabled'));
    setTimeout(() => {
      const yep = document.createElement('div');
      yep.className = 'chat-bubble bubble-left';
      yep.textContent = '答对啦！🎉 来看看这次有什么不同~';
      container.insertBefore(yep, options);
      requestAnimationFrame(() => yep.classList.add('show'));
      container.scrollTop = container.scrollHeight;
    }, 600);
    setTimeout(() => showReveal(), 2200);
  }
}

function showReveal() {
  document.getElementById('page-chat').classList.remove('active');
  document.getElementById('page-chat').classList.add('exit-left');
  document.getElementById('page-reveal').classList.add('active');
}

function enterHome() {
  Store.set('played', true);
  location.href = 'menu.html';
}
</script>
</body>
</html>
