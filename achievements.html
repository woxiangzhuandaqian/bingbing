<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>我的成就 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
.achievements-body { padding: 0 20px 40px; }

.achievement-summary {
  text-align: center; padding: 20px 0 30px;
}
.achievement-count { font-size: 36px; font-weight: 700; color: var(--green-dark); }
.achievement-label { font-size: 14px; color: var(--gray); margin-top: 4px; }

.achievement-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; background: white; border-radius: 16px;
  margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.3s;
}

.achievement-item.locked { opacity: 0.5; }
.achievement-item.unlocked { animation: slideUp 0.4s ease; }

.achievement-emoji {
  font-size: 32px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; background: var(--gray-light); flex-shrink: 0;
}

.achievement-item.unlocked .achievement-emoji {
  background: var(--green-light);
}

.achievement-info { flex: 1; }
.achievement-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.achievement-desc { font-size: 13px; color: var(--gray); }

.achievement-status {
  font-size: 12px; padding: 4px 10px; border-radius: 10px; flex-shrink: 0;
}
.achievement-status.done { background: var(--green-light); color: var(--green-dark); }
.achievement-status.todo { background: var(--gray-light); color: var(--gray); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-title" id="page-title">我的成就</div>
</div>

<div class="achievements-body">
  <div class="achievement-summary">
    <div class="achievement-count" id="count"></div>
    <div class="achievement-label">已解锁成就</div>
  </div>
  <div id="achievement-list"></div>
</div>

<script src="app.js?v=8"></script>
<script src="supabase.js"></script>
<script>
showIdentityPicker();

let _titleTapCount = 0;
let _titleTapTimer = null;
document.getElementById('page-title').addEventListener('click', function() {
  _titleTapCount++;
  clearTimeout(_titleTapTimer);
  _titleTapTimer = setTimeout(() => { _titleTapCount = 0; }, 2000);
  if (_titleTapCount >= 5) {
    _titleTapCount = 0;
    showSwitchUser();
  }
});

function showSwitchUser() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease;';
  const current = User.get();
  overlay.innerHTML = '<div style="background:white;border-radius:24px;padding:36px 28px;text-align:center;width:85%;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.15)">' +
    '<div style="font-size:18px;font-weight:700;color:#333;margin-bottom:8px">切换身份</div>' +
    '<div style="font-size:13px;color:#aaa;margin-bottom:24px">当前：' + (current === 'bingbing' ? '🧊🧊女王' : '👨‍🍳家希') + '</div>' +
    '<div style="display:flex;gap:12px;justify-content:center">' +
      '<button id="sw-bingbing" style="flex:1;padding:16px 12px;border:2px solid ' + (current === 'bingbing' ? '#66bb6a' : '#e8f5e9') + ';border-radius:16px;background:white;cursor:pointer">' +
        '<div style="font-size:32px;margin-bottom:8px">🧊</div><div style="font-size:14px;font-weight:600;color:#333">🧊🧊女王</div>' +
      '</button>' +
      '<button id="sw-jiaxi" style="flex:1;padding:16px 12px;border:2px solid ' + (current === 'jiaxi' ? '#66bb6a' : '#e3f2fd') + ';border-radius:16px;background:white;cursor:pointer">' +
        '<div style="font-size:32px;margin-bottom:8px">👨‍🍳</div><div style="font-size:14px;font-weight:600;color:#333">家希</div>' +
      '</button>' +
    '</div>' +
    '<div style="margin-top:16px;font-size:12px;color:#ccc">点击空白处关闭</div>' +
  '</div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  overlay.querySelector('#sw-bingbing').addEventListener('click', function() { User.set('bingbing'); overlay.remove(); location.reload(); });
  overlay.querySelector('#sw-jiaxi').addEventListener('click', function() { User.set('jiaxi'); overlay.remove(); location.reload(); });
}
const ALL_ACHIEVEMENTS = ACHIEVEMENTS;

async function loadAchievements() {
  await verifyAchievements();
  const unlocked = await getUnlockedAchievements();

  const unlockedCount = ALL_ACHIEVEMENTS.filter(a => unlocked.includes(a.id)).length;
  document.getElementById('count').textContent = unlockedCount + ' / ' + ALL_ACHIEVEMENTS.length;

  const listEl = document.getElementById('achievement-list');
  listEl.innerHTML = ALL_ACHIEVEMENTS.map(ach => {
    const isUnlocked = unlocked.includes(ach.id);
    return '<div class="achievement-item ' + (isUnlocked ? 'unlocked' : 'locked') + '">' +
      '<div class="achievement-emoji">' + (isUnlocked ? ach.emoji : '🔒') + '</div>' +
      '<div class="achievement-info"><div class="achievement-name">' + ach.name + '</div><div class="achievement-desc">' + ach.desc + '</div></div>' +
      '<span class="achievement-status ' + (isUnlocked ? 'done' : 'todo') + '">' + (isUnlocked ? '已解锁' : '未解锁') + '</span>' +
    '</div>';
  }).join('');
}

async function verifyAchievements() {
  if (User.isViewMode()) return;
  const user = User.get();
  if (!user) return;
  const unlocked = await getUnlockedAchievements();

  if (!unlocked.includes('first_order')) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/orders?user=eq.' + user + '&select=id&limit=1', { headers: supabaseHeaders });
    const data = res.ok ? await res.json() : [];
    if (data.length > 0) await unlockAchievement('first_order');
  }

  if (!unlocked.includes('streak_3')) {
    const streak = await getOrderStreak();
    if (streak >= 3) await unlockAchievement('streak_3');
  }

  if (!unlocked.includes('streak_7')) {
    const streak = await getOrderStreak();
    if (streak >= 7) await unlockAchievement('streak_7');
  }

  if (!unlocked.includes('wishlist_done')) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/dishes?from_wish=eq.true&select=id&limit=1', { headers: supabaseHeaders });
    const data = res.ok ? await res.json() : [];
    if (data.length > 0) await unlockAchievement('wishlist_done');
  }

  if (!unlocked.includes('msg_10')) {
    const count = await getMessageCount();
    if (count >= 10) await unlockAchievement('msg_10');
  }

  if (!unlocked.includes('msg_30')) {
    const count = await getMessageCount();
    if (count >= 30) await unlockAchievement('msg_30');
  }

  if (!unlocked.includes('random_5')) {
    const count = await getInteractionCount('random');
    if (count >= 5) await unlockAchievement('random_5');
  }

  if (!unlocked.includes('order_10')) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/orders?user=eq.' + user + '&select=eat_date', { headers: supabaseHeaders });
    const data = res.ok ? await res.json() : [];
    const distinctDates = [...new Set(data.map(o => o.eat_date))];
    if (distinctDates.length >= 10) await unlockAchievement('order_10');
  }

  if (!unlocked.includes('wishlist_5')) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/wishlist?user=eq.' + user + '&select=id', { headers: supabaseHeaders });
    const data = res.ok ? await res.json() : [];
    if (data.length >= 5) await unlockAchievement('wishlist_5');
  }

  if (!unlocked.includes('review_10')) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/reviews?user=eq.' + user + '&select=id', { headers: supabaseHeaders });
    const data = res.ok ? await res.json() : [];
    if (data.length >= 10) await unlockAchievement('review_10');
  }
}

loadAchievements();
</script>
<script src="tab-bar.js"></script>
</body>
</html>
