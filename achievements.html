<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>我的成就 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
.achievements-body { padding: 0 20px 40px; }

.achievement-summary {
  text-align: center; padding: 20px 0 30px;
}
.achievement-count { font-size: 36px; font-weight: 700; color: var(--green-dark); }
.achievement-label { font-size: 14px; color: var(--gray); margin-top: 4px; }

.achievement-item {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; background: white; border-radius: 16px;
  margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.3s;
}

.achievement-item.locked { opacity: 0.5; }
.achievement-item.unlocked { animation: slideUp 0.4s ease; }

.achievement-emoji {
  font-size: 32px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 12px; background: var(--gray-light); flex-shrink: 0;
}

.achievement-item.unlocked .achievement-emoji {
  background: var(--green-light);
}

.achievement-info { flex: 1; }
.achievement-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.achievement-desc { font-size: 13px; color: var(--gray); }

.achievement-status {
  font-size: 12px; padding: 4px 10px; border-radius: 10px; flex-shrink: 0;
}
.achievement-status.done { background: var(--green-light); color: var(--green-dark); }
.achievement-status.todo { background: var(--gray-light); color: var(--gray); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-title">我的成就</div>
</div>

<div class="achievements-body">
  <div class="achievement-summary">
    <div class="achievement-count" id="count"></div>
    <div class="achievement-label">已解锁成就</div>
  </div>
  <div id="achievement-list"></div>
</div>

<script src="app.js?v=5"></script>
<script src="supabase.js"></script>
<script>
const ALL_ACHIEVEMENTS = [
  { id: 'first_order', emoji: '🎯', name: '首次点单', desc: '完成第一次点单' },
  { id: 'streak_3', emoji: '🔥', name: '连续点单', desc: '连续3天点单' },
  { id: 'select_all', emoji: '👑', name: '全选达人', desc: '一次全选所有菜品' },
  { id: 'wishlist_done', emoji: '💫', name: '心愿实现', desc: '第一个心愿菜品上线' },
  { id: 'msg_10', emoji: '📝', name: '留言达人', desc: '留言超过10条' },
  { id: 'random_5', emoji: '🎲', name: '随缘吃货', desc: '使用随机推荐5次' },
  // 第二阶段
  { id: 'streak_7', emoji: '💪', name: '铁杆吃货', desc: '连续7天点单', phase: 2 },
  { id: 'order_10', emoji: '🏅', name: '十单元老', desc: '累计点单10次', phase: 2 },
  { id: 'msg_30', emoji: '💬', name: '话痨本痨', desc: '留言超过30条', phase: 2 },
  { id: 'wishlist_5', emoji: '🌟', name: '许愿达人', desc: '许了5个愿望', phase: 2 },
  { id: 'review_10', emoji: '🍽️', name: '美食评论家', desc: '评价10次', phase: 2 },
  { id: 'all_good', emoji: '⭐', name: '全五星好评', desc: '给所有菜品好评', phase: 2 },
];

async function loadAchievements() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/achievements?user=eq.' + User.getViewUser() + '&select=achievement_id', { headers: supabaseHeaders });
  const data = res.ok ? await res.json() : [];
  const unlocked = data.map(d => d.achievement_id);

  const phase1 = ALL_ACHIEVEMENTS.filter(a => !a.phase);
  const phase1Done = phase1.every(a => unlocked.includes(a.id));
  const showList = phase1Done ? ALL_ACHIEVEMENTS : phase1;

  document.getElementById('count').textContent = unlocked.length + ' / ' + showList.length;

  const listEl = document.getElementById('achievement-list');
  listEl.innerHTML = showList.map(ach => {
    const isUnlocked = unlocked.includes(ach.id);
    return '<div class="achievement-item ' + (isUnlocked ? 'unlocked' : 'locked') + '">' +
      '<div class="achievement-emoji">' + (isUnlocked ? ach.emoji : '🔒') + '</div>' +
      '<div class="achievement-info"><div class="achievement-name">' + ach.name + '</div><div class="achievement-desc">' + ach.desc + '</div></div>' +
      '<span class="achievement-status ' + (isUnlocked ? 'done' : 'todo') + '">' + (isUnlocked ? '已解锁' : '未解锁') + '</span>' +
    '</div>';
  }).join('');
}

loadAchievements();
</script>
<script src="tab-bar.js"></script>
</body>
</html>
