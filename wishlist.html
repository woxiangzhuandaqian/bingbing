<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>心愿菜单 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(180deg, #e8eaf6 0%, #f3e5f5 50%, #fce4ec 100%); }

.page-header { background: transparent; }
.back-btn { color: #666; }
.page-header-title { color: #333; }

/* 许愿池 */
.pool-area {
  flex: 1; position: relative; overflow-y: auto; overflow-x: hidden;
  padding-bottom: 100px;
}
.pool-canvas {
  position: relative; width: 100%; min-height: 100%;
  box-sizing: border-box;
}

.star-wish {
  position: absolute; cursor: pointer; transition: transform 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  width: 70px;
}
.star-wish:active { transform: scale(1.2); }

.star-icon {
  font-size: 32px; animation: twinkle 3s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255, 183, 77, 0.5));
}

.star-wish:nth-child(2n) .star-icon { animation-delay: 0.5s; }
.star-wish:nth-child(3n) .star-icon { animation-delay: 1s; }
.star-wish:nth-child(4n) .star-icon { animation-delay: 1.5s; }

.star-wish.done .star-icon {
  filter: drop-shadow(0 0 12px rgba(102, 187, 106, 0.8));
}

@keyframes twinkle {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

.star-label {
  font-size: 11px; color: #666; text-align: center;
  max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.star-wish.done .star-label { color: var(--green-dark); }

/* 空状态 */
.pool-empty {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; color: #999;
}
.pool-empty-emoji { font-size: 48px; margin-bottom: 12px; }
.pool-empty-text { font-size: 14px; line-height: 1.8; }

/* 投币动画 */
.coin-anim {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 60px; z-index: 400; pointer-events: none;
  animation: coinDrop 1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes coinDrop {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, 20vh) scale(0.8) rotate(180deg); }
  100% { opacity: 0; transform: translate(-50%, 40vh) scale(0.3) rotate(360deg); }
}

/* 底部输入 */
.input-row {
  background: rgba(255,255,255,0.6); border-top: 1px solid rgba(0,0,0,0.05);
}
.input-bar-text { background: white; border-color: #e0e0e0; color: #333; }
.input-bar-text::placeholder { color: #aaa; }
.input-bar-text:focus { border-color: #ffb74d; }

/* 点击详情弹窗 */
.wish-detail {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 300;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.wish-detail.show { opacity: 1; pointer-events: auto; }
.wish-detail-card {
  background: white; border: 1px solid rgba(255,183,77,0.3);
  border-radius: 20px; padding: 28px 24px; text-align: center;
  width: 80%; max-width: 280px; transform: scale(0.9);
  transition: transform 0.3s;
}
.wish-detail.show .wish-detail-card { transform: scale(1); }
.wish-detail-emoji { font-size: 40px; margin-bottom: 10px; }
.wish-detail-text { font-size: 16px; color: #333; margin-bottom: 8px; }
.wish-detail-time { font-size: 12px; color: #aaa; margin-bottom: 12px; }
.wish-detail-status { font-size: 13px; padding: 4px 12px; border-radius: 10px; display: inline-block; }
.wish-detail-status.pending { background: rgba(255,152,0,0.2); color: #ffb74d; }
.wish-detail-status.done { background: rgba(102,187,106,0.2); color: #81c784; }

.wish-done-btn {
  margin-top: 14px; padding: 6px 14px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #66bb6a, #43a047); color: white;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s;
}
.wish-done-btn:active { transform: scale(0.95); }
.wish-done-btn.hidden { display: none; }

.wd-replies { margin-top: 12px; max-height: 120px; overflow-y: auto; width: 100%; }
.wd-reply-item { font-size: 12px; color: #555; line-height: 1.5; margin-bottom: 4px; text-align: left; }
.wd-reply-name { font-weight: 600; color: #888; }
.wd-reply-input { display: flex; gap: 6px; margin-top: 10px; width: 100%; }
.wd-reply-input input { flex: 1; padding: 6px 12px; border: 1px solid #ddd; border-radius: 16px; font-size: 12px; outline: none; }
.wd-reply-input input:focus { border-color: #66bb6a; }
.wd-reply-input button { width: 30px; height: 30px; border: none; border-radius: 50%; background: #66bb6a; color: white; font-size: 14px; cursor: pointer; }

/* 背景装饰 */
.bg-stars {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
}
.bg-star {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  opacity: 0.3; animation: twinkle 4s ease-in-out infinite;
}
</style>
</head>
<body>

<div class="bg-stars" id="bg-stars"></div>

<div class="page-header" style="z-index:10;position:relative">
  <div class="page-header-title">✨ 许愿池</div>
</div>

<div class="pool-area" id="pool-area"><div class="pool-canvas" id="pool-canvas"></div></div>

<div class="input-row" id="wish-input-wrap"></div>

<!-- 详情弹窗 -->
<div class="wish-detail" id="wish-detail" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="wish-detail-card">
    <div class="wish-detail-emoji" id="wd-emoji"></div>
    <div class="wish-detail-text" id="wd-text"></div>
    <div class="wish-detail-time" id="wd-time"></div>
    <div class="wish-detail-status" id="wd-status"></div>
    <div class="wd-replies" id="wd-replies"></div>
    <div class="wd-reply-input">
      <input id="wd-reply-input" placeholder="回复这个心愿~" maxlength="60" onkeydown="if(event.key==='Enter')submitWishReply()">
      <button onclick="submitWishReply()">➤</button>
    </div>
    <button class="wish-done-btn" id="wd-done-btn" onclick="markWishDone()">✨ 心愿已实现！</button>
  </div>
</div>

<script src="app.js?v=5"></script>
<script src="supabase.js"></script>
<script src="input-bar.js"></script>
<script>
let wishlist = [];

const wishBar = InputBar.create({
  container: 'wish-input-wrap',
  placeholder: '想吃什么？投币许愿~',
  sendIcon: '🪙',
  showImage: false,
  onSend: addWish
});
wishBar.getSendBtn().style.background = '#ffd700';
wishBar.getSendBtn().style.color = '#333';

function renderWishlist() {
  const area = document.getElementById('pool-area');
  const canvas = document.getElementById('pool-canvas');
  if (wishlist.length === 0) {
    canvas.style.height = '';
    canvas.innerHTML = '<div class="pool-empty"><div class="pool-empty-emoji">🌙</div><div class="pool-empty-text">许愿池还是空的哦~<br>投一枚硬币，说出你想吃的</div></div>';
    return;
  }
  const layout = generatePositions(wishlist.length, area.clientWidth);
  canvas.style.height = layout.height + 'px';
  canvas.innerHTML = wishlist.map((item, i) => {
    const done = item.done;
    const pos = layout.positions[i];
    return '<div class="star-wish ' + (done ? 'done' : '') + '" style="left:' + pos.x + 'px;top:' + pos.y + 'px" onclick="showWishDetail(' + i + ')">' +
      '<span class="star-icon">' + (done ? '🌟' : '⭐') + '</span>' +
      '<span class="star-label">' + item.text + '</span>' +
    '</div>';
  }).join('');
}

function hashId(id) {
  const s = String(id);
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}
function seededRand(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function generatePositions(count, areaWidth) {
  const PAD = 20;          // 画布内边距
  const STAR_W = 70;       // 单颗星星宽度
  const W = Math.max(STAR_W, areaWidth - PAD * 2); // 可用宽度
  const cols = Math.max(2, Math.floor((W + 20) / (STAR_W + 20))); // 列数随宽度自适应
  const colW = W / cols;
  const rowH = 92;         // 行高
  const slackX = Math.max(0, colW - STAR_W); // 格子内横向可抖动余量
  const slackY = 20;       // 纵向抖动幅度

  const positions = [];
  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const id = wishlist[i] ? wishlist[i].id : i;
    const seed = hashId(id);
    const jitterX = (seededRand(seed) - 0.5) * slackX;
    const jitterY = (seededRand(seed + 1) - 0.5) * slackY;
    const x = PAD + col * colW + slackX / 2 + jitterX;
    const y = PAD + row * rowH + jitterY;
    positions.push({ x, y });
  }
  const rows = Math.ceil(count / cols);
  const height = PAD * 2 + rows * rowH;
  return { positions, height };
}

async function loadWishlist() {
  wishlist = await DB.getAll('wishlist', 'time.desc');
  renderWishlist();
  autoMatchWishes();
}

async function addWish({ text }) {
  if (User.isViewMode()) return;
  if (!text) return;

  const coin = document.createElement('div');
  coin.className = 'coin-anim';
  coin.textContent = '🪙';
  document.body.appendChild(coin);
  setTimeout(() => coin.remove(), 1000);

  const item = await DB.insert('wishlist', { text: text, time: Date.now(), done: false });
  if (item) {
    wishlist.unshift(item);
    setTimeout(() => renderWishlist(), 600);
  }
  sendNotification('💫🧊🧊许了个愿：' + text);
  trackInteraction('wishlist');
  addUnread('wishlist');
}

let currentWishIndex = -1;

function showWishDetail(i) {
  currentWishIndex = i;
  const item = wishlist[i];
  if (!item) return;
  document.getElementById('wd-emoji').textContent = item.done ? '🌟' : '⭐';
  document.getElementById('wd-text').textContent = item.text;
  document.getElementById('wd-time').textContent = formatTime(item.time);
  const status = document.getElementById('wd-status');
  status.textContent = item.done ? '✨ 心愿已实现' : '🔮 等待解锁中...';
  status.className = 'wish-detail-status ' + (item.done ? 'done' : 'pending');
  const doneBtn = document.getElementById('wd-done-btn');
  doneBtn.classList.toggle('hidden', item.done);
  document.getElementById('wd-reply-input').value = '';
  loadWishReplies(item.id);
  document.getElementById('wish-detail').classList.add('show');
}

async function loadWishReplies(wishId) {
  const el = document.getElementById('wd-replies');
  el.innerHTML = '';
  const res = await fetch(SUPABASE_URL + '/rest/v1/replies?target_table=eq.wishlist&target_id=eq.' + wishId + '&order=time.asc', {
    headers: supabaseHeaders
  });
  const replies = res.ok ? await res.json() : [];
  if (replies.length === 0) { el.innerHTML = '<div style="text-align:center;color:#ccc;font-size:11px">还没有回复~</div>'; return; }
  el.innerHTML = replies.map(r => {
    const name = r.user === 'bingbing' ? '🧊冰冰宝宝' : '👨‍🍳张笨笨';
    return '<div class="wd-reply-item"><span class="wd-reply-name">' + name + '：</span>' + r.text.replace(/</g,'&lt;') + '</div>';
  }).join('');
}

async function submitWishReply() {
  const input = document.getElementById('wd-reply-input');
  const text = input.value.trim();
  if (!text || currentWishIndex < 0) return;
  const user = User.get();
  if (!user) { await showIdentityPicker(); }
  const wishId = wishlist[currentWishIndex].id;
  input.value = '';
  await fetch(SUPABASE_URL + '/rest/v1/replies', {
    method: 'POST',
    headers: supabaseHeaders,
    body: JSON.stringify({ target_table: 'wishlist', target_id: wishId, text: text, user: User.get(), time: Date.now() })
  });
  trackInteraction('reply');
  loadWishReplies(wishId);
}

async function markWishDone() {
  const item = wishlist[currentWishIndex];
  if (!item || item.done) return;
  await DB.update('wishlist', item.id, { done: true });
  item.done = true;
  document.getElementById('wd-emoji').textContent = '🌟';
  document.getElementById('wd-status').textContent = '✨ 心愿已实现';
  document.getElementById('wd-status').className = 'wish-detail-status done';
  document.getElementById('wd-done-btn').classList.add('hidden');
  renderWishlist();
  // 自动加到菜单
  await fetch(SUPABASE_URL + '/rest/v1/dishes', {
    method: 'POST',
    headers: supabaseHeaders,
    body: JSON.stringify({
      key: 'wish_' + item.id,
      emoji: '✨',
      name: item.text,
      subtitle: '来自心愿',
      tags: ['心愿实现'],
      taste: '',
      category: '菜品',
      added_at: new Date().toISOString().split('T')[0],
      from_wish: true
    })
  });
  sendNotification('🌟 心愿实现啦：' + item.text + '（已加入菜单）');
  trackInteraction('wish_done');
  addUnread('wishlist');
  if (typeof checkAchievements !== 'undefined') checkAchievements('wishlist_done');
}

// 自动匹配：检查菜单里是否有菜名包含心愿关键词
function autoMatchWishes() {
  if (typeof dishData === 'undefined') return;
  const dishNames = Object.values(dishData).map(d => d.name);
  wishlist.forEach(item => {
    if (item.done) return;
    const matched = dishNames.some(name => item.text.includes(name) || name.includes(item.text));
    if (matched) {
      DB.update('wishlist', item.id, { done: true });
      item.done = true;
    }
  });
  renderWishlist();
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0') + ':' + d.getSeconds().toString().padStart(2, '0');
}

document.getElementById('wish-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addWish();
});

// 背景小星星
const bgColors = ['#ffb74d', '#f48fb1', '#90caf9', '#a5d6a7', '#ce93d8'];
const bgStars = document.getElementById('bg-stars');
for (let i = 0; i < 30; i++) {
  const s = document.createElement('div');
  s.className = 'bg-star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.background = bgColors[i % bgColors.length];
  s.style.animationDelay = Math.random() * 4 + 's';
  s.style.opacity = Math.random() * 0.3 + 0.1;
  bgStars.appendChild(s);
}

async function init() {
  await showIdentityPicker();
  if (User.isViewMode()) {
    document.querySelector('.input-row').style.display = 'none';
  }
  loadWishlist();
}
init();
</script>
<script src="tab-bar.js"></script>
</body>
</html>
