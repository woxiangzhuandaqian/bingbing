<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>我们的猫 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; flex-direction: column; background: #fefefe; }

.info { text-align: center; padding: 28px 20px 10px; }
.info-title { font-size: 18px; font-weight: 700; color: #333; margin-bottom: 6px; }
.info-stage { font-size: 13px; color: #999; margin-bottom: 4px; }
.info-count { font-size: 11px; color: #bbb; }
.info-progress { width: 50%; max-width: 180px; height: 4px; background: #eee; border-radius: 2px; margin: 10px auto 0; overflow: hidden; }
.info-progress-bar { height: 100%; border-radius: 2px; transition: width 1.5s ease; background: linear-gradient(90deg, #ffab91, #f48fb1, #ce93d8); }

.pet-area {
  flex: 1; position: relative; overflow: hidden;
  border-bottom: 3px solid #eee;
  margin-bottom: 70px;
}

.pet {
  position: absolute; bottom: 0; left: 50%;
  width: 80px; height: 80px;
  cursor: pointer; transition: none;
  image-rendering: pixelated;
}

.pet img {
  width: 100%; height: 100%; object-fit: contain;
  pointer-events: none;
}

.pet-bubble {
  position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
  background: white; border: 2px solid #eee; border-radius: 12px;
  padding: 4px 10px; font-size: 13px; white-space: nowrap;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.pet-bubble.show { opacity: 1; }
.pet-bubble::after {
  content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
  border-left: 6px solid transparent; border-right: 6px solid transparent;
  border-top: 6px solid white;
}

.actions {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 12px; z-index: 10;
}
.action-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  font-size: 20px; cursor: pointer; transition: all 0.2s;
}
.action-btn:active { transform: scale(0.85); }

.test-panel {
  position: fixed; top: 90px; left: 10px; z-index: 999;
  background: rgba(0,0,0,0.7); border-radius: 12px; padding: 8px;
  display: flex; flex-wrap: wrap; gap: 5px; max-width: 160px;
}
.test-btn { padding: 4px 8px; border: none; border-radius: 6px; background: rgba(255,255,255,0.15); color: white; font-size: 10px; cursor: pointer; }
</style>
</head>
<body>

<div class="test-panel">
  <button class="test-btn" onclick="forceState('idle')">发呆</button>
  <button class="test-btn" onclick="forceState('walk_left')">走左</button>
  <button class="test-btn" onclick="forceState('walk_right')">走右</button>
  <button class="test-btn" onclick="forceState('idle_to_sleep')">困了</button>
  <button class="test-btn" onclick="forceState('sleep')">睡觉</button>
</div>

<div class="info">
  <div class="info-title">🐱 我们的猫</div>
  <div class="info-stage" id="stage-name"></div>
  <div class="info-count" id="tree-count"></div>
  <div class="info-progress"><div class="info-progress-bar" id="progress-bar"></div></div>
</div>

<div class="pet-area" id="pet-area">
  <div class="pet" id="pet" onclick="onPetClick()">
    <div class="pet-bubble" id="pet-bubble"></div>
    <img id="pet-img" src="pet/idle.gif">
  </div>
  <div class="actions">
    <button class="action-btn" onclick="petAction('pat')">🤚</button>
    <button class="action-btn" onclick="petAction('feed')">🐟</button>
    <button class="action-btn" onclick="petAction('love')">❤️</button>
  </div>
</div>

<script src="app.js?v=8"></script>
<script src="supabase.js"></script>
<script>
const pet = document.getElementById('pet');
const petImg = document.getElementById('pet-img');
const petArea = document.getElementById('pet-area');

let currentState = 'idle';
let posX = 50;
let moveSpeed = 1.5;
let stateTimer = null;
let moveInterval = null;

const GIFS = {
  idle: 'pet/idle.gif',
  walk_left: 'pet/walk-left.gif',
  walk_right: 'pet/walk-right.gif',
  idle_to_sleep: 'pet/idle-to-sleep.gif',
  sleep: 'pet/sleep.gif',
  sleep_to_idle: 'pet/sleep-to-idle.gif',
};

const STATE_DURATION = {
  idle: [3000, 6000],
  walk_left: [3000, 6000],
  walk_right: [3000, 6000],
  idle_to_sleep: [1600, 1600],
  sleep: [5000, 10000],
  sleep_to_idle: [1600, 1600],
};

function setState(state) {
  currentState = state;
  petImg.src = GIFS[state];
  clearInterval(moveInterval);

  if (state === 'walk_left' || state === 'walk_right') {
    moveInterval = setInterval(() => {
      if (state === 'walk_left') posX -= moveSpeed;
      else posX += moveSpeed;
      posX = Math.max(5, Math.min(posX, 95));
      pet.style.left = posX + '%';
    }, 30);
  }

  const [minTime, maxTime] = STATE_DURATION[state];
  const duration = minTime + Math.random() * (maxTime - minTime);

  clearTimeout(stateTimer);
  stateTimer = setTimeout(() => {
    const next = getNextState(state);
    setState(next);
  }, duration);
}

function getNextState(state) {
  if (state === 'idle') return randomChoice(['idle', 'idle', 'walk_left', 'walk_right', 'idle_to_sleep']);
  if (state === 'idle_to_sleep') return 'sleep';
  if (state === 'sleep') return randomChoice(['sleep', 'sleep_to_idle']);
  if (state === 'sleep_to_idle') return 'idle';
  if (state === 'walk_left') return randomChoice(['idle', 'walk_left', 'walk_right']);
  if (state === 'walk_right') return randomChoice(['idle', 'walk_left', 'walk_right']);
  return 'idle';
}

function randomChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function forceState(state) { setState(state); }

function showBubble(text) {
  const bubble = document.getElementById('pet-bubble');
  bubble.textContent = text;
  bubble.classList.add('show');
  setTimeout(() => bubble.classList.remove('show'), 2000);
}

function onPetClick() {
  const msgs = ['喵~', '蹭蹭', '咕噜咕噜', '嗯?', '摸摸~', '❤️'];
  showBubble(randomChoice(msgs));
  setState('idle');
}

function petAction(type) {
  if (type === 'pat') {
    showBubble(randomChoice(['呼噜呼噜~', '好舒服~', '再摸摸', '喵~']));
  } else if (type === 'feed') {
    showBubble(randomChoice(['好吃!', '还要!', '😋', '鱼鱼!']));
  } else if (type === 'love') {
    showBubble(randomChoice(['❤️', '爱你~', '贴贴', '💕']));
  }
  setState('idle');
  if (typeof trackInteraction !== 'undefined') trackInteraction('reply');
}

// 初始化位置
posX = 30 + Math.random() * 40;
pet.style.left = posX + '%';
setState('idle');

// 加载成长值
const STAGES = [
  { name: '猫蛋', min: 0, max: 5 },
  { name: '小奶猫', min: 6, max: 15 },
  { name: '幼猫', min: 16, max: 30 },
  { name: '小猫', min: 31, max: 60 },
  { name: '大猫', min: 61, max: 100 },
  { name: '猫王', min: 101, max: 150 },
  { name: '神猫', min: 151, max: 99999 },
];

async function loadPet() {
  const res = await fetch(SUPABASE_URL + '/rest/v1/interactions?select=points', { headers: supabaseHeaders });
  let count = 0;
  if (res.ok) {
    const data = await res.json();
    count = data.reduce((sum, d) => sum + (d.points || 1), 0);
  }
  let idx = 0;
  for (let i = STAGES.length - 1; i >= 0; i--) {
    if (count >= STAGES[i].min) { idx = i; break; }
  }
  const stage = STAGES[idx];
  const progress = (count - stage.min) / (stage.max - stage.min + 1);
  document.getElementById('stage-name').textContent = '第' + (idx + 1) + '阶段 · ' + stage.name;
  document.getElementById('tree-count').textContent = '成长值 ' + count + ' · 下一阶段还需 ' + Math.max(stage.max - count + 1, 0);
  document.getElementById('progress-bar').style.width = Math.min(progress * 100, 100) + '%';
}
loadPet();
</script>
<script src="tab-bar.js"></script>
</body>
</html>
