<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>留言板 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
body { min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(180deg, #e3f2fd 0%, #fff8e1 50%, #fce4ec 100%); }

.page-header { background: transparent; }

/* 便利贴墙 */
.board {
  flex: 1; padding: 16px; padding-bottom: 130px; overflow-y: auto;
  display: flex; flex-wrap: wrap; align-content: flex-start;
  gap: 12px; justify-content: center;
}

.note {
  width: calc(50% - 10px); min-height: 120px; padding: 16px 14px;
  border-radius: 4px; position: relative; overflow: hidden;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.1);
  display: flex; flex-direction: column; justify-content: space-between;
  transition: transform 0.2s;
}
.note:active { transform: scale(0.96) rotate(0deg) !important; }

@keyframes slapOn {
  0% { opacity: 0; transform: scale(0.5) rotate(-10deg) translateY(-30px); }
  60% { opacity: 1; transform: scale(1.05) rotate(1deg); }
  100% { transform: scale(1) rotate(var(--rotate)); }
}

.note-text {
  font-size: 14px; line-height: 1.6; color: #333;
  word-break: break-all; flex: 1;
}

.note-time {
  font-size: 10px; color: rgba(0,0,0,0.3); margin-top: 10px; text-align: right;
}

.note-pin {
  position: absolute; top: -6px; left: 50%; transform: translateX(-50%);
  font-size: 14px;
}

/* 回复区 */
.note-replies { margin-top: 8px; border-top: 1px dashed rgba(0,0,0,0.1); padding-top: 6px; }
.reply-item { font-size: 11px; color: #555; line-height: 1.5; margin-bottom: 4px; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: background 0.2s; }
.reply-item:active { background: rgba(0,0,0,0.05); }
.reply-item-name { font-weight: 600; color: #888; }
.reply-quote { font-size: 10px; color: #999; padding: 1px 6px; border-left: 2px solid #ddd; background: rgba(0,0,0,0.03); border-radius: 0 4px 4px 0; margin-bottom: 2px; }
.reply-target-hint { font-size: 10px; color: #66bb6a; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
.reply-target-hint .cancel-reply { color: #f44336; cursor: pointer; margin-left: 6px; }
.reply-expand { font-size: 11px; color: #66bb6a; text-align: center; padding: 4px 0; cursor: pointer; }
.note-reply-input {
  display: flex; gap: 4px; margin-top: 6px;
}
.note-reply-input input {
  flex: 1; min-width: 0; padding: 4px 8px; border: 1px solid #ddd; border-radius: 10px;
  font-size: 11px; outline: none; background: rgba(255,255,255,0.7);
  box-sizing: border-box;
}
.note-reply-input button {
  padding: 4px 10px; border: none; border-radius: 10px;
  background: rgba(0,0,0,0.1); font-size: 14px; cursor: pointer; flex-shrink: 0;
}
}

/* 便利贴颜色 */
.note-yellow { background: #fff9c4; }
.note-pink { background: #fce4ec; }
.note-blue { background: #e3f2fd; }
.note-green { background: #e8f5e9; }
.note-orange { background: #fff3e0; }
.note-purple { background: #f3e5f5; }

/* 空状态 */
.board-empty {
  width: 100%; text-align: center; padding: 60px 20px; color: var(--gray);
}
.board-empty-emoji { font-size: 48px; margin-bottom: 12px; }
.board-empty-text { font-size: 14px; line-height: 1.8; }

.note-delete { position: absolute; top: 6px; right: 8px; font-size: 12px; color: #ccc; cursor: pointer; opacity: 0.6; }
.note-delete:active { opacity: 1; color: #f44336; }
.reply-delete { font-size: 10px; color: #ccc; cursor: pointer; margin-left: 4px; }
.reply-delete:active { color: #f44336; }

/* 输入区 */
.input-row { background: rgba(255,255,255,0.6); border-top: 1px solid rgba(0,0,0,0.05); }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-title">📌 留言板</div>
</div>

<div class="board" id="board"></div>

<div class="input-row">
  <input class="input-field" id="msg-input" placeholder="想说点什么~" maxlength="100">
  <button class="input-submit" onclick="addMessage()">📌</button>
</div>

<script src="app.js?v=5"></script>
<script src="supabase.js"></script>
<script>
const COLORS = ['note-yellow', 'note-pink', 'note-blue', 'note-green', 'note-orange', 'note-purple'];
const ROTATIONS = [-3, -1.5, 0, 1.5, 3, -2, 2];

let messages = [];
let msgReplyTarget = null; // { msgIdx, replyId, text }
let _skipAnim = false;

function renderMessages() {
  const board = document.getElementById('board');
  if (messages.length === 0) {
    board.innerHTML = '<div class="board-empty"><div class="board-empty-emoji">📌</div><div class="board-empty-text">还没有便利贴哦~<br>写点什么，我会看到的</div></div>';
    return;
  }
  const animStyle = _skipAnim ? '' : 'animation:slapOn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);';
  function renderReply(r, i, replies, item) {
    const name = r.user === 'bingbing' ? '🧊冰冰宝宝' : '👨‍🍳张笨笨';
    const t = new Date(r.time);
    const timeStr = (t.getMonth()+1) + '/' + t.getDate() + ' ' + t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0') + ':' + t.getSeconds().toString().padStart(2,'0');
    const quoteHtml = r.reply_to ? getMsgQuoteHtml(r.reply_to, replies, item) : '';
    const delHtml = r.user === User.get() ? '<span class="reply-delete" onclick="event.stopPropagation();deleteReply(\'' + r.id + '\')">×</span>' : '';
    return '<div class="reply-item" onclick="setMsgReplyTarget(' + i + ',\'' + r.id + '\',this)">' + quoteHtml + '<span class="reply-item-name">' + name + '：</span>' + escapeHtml(r.text) + ' <span style="color:#bbb;font-size:10px">' + timeStr + '</span>' + delHtml + '</div>';
  }
  board.innerHTML = messages.map((item, i) => {
    const color = COLORS[i % COLORS.length];
    const rotate = ROTATIONS[i % ROTATIONS.length];
    const replies = item._replies || [];
    let repliesHtml = '';
    if (replies.length > 8) {
      const hidden = replies.slice(0, replies.length - 3);
      const visible = replies.slice(-3);
      repliesHtml += '<div class="reply-expand" onclick="var h=this.nextElementSibling;if(h.style.display===\'none\'){h.style.display=\'block\';this.textContent=\'收起 ▲\'}else{h.style.display=\'none\';this.textContent=\'展开更多（' + hidden.length + '条）▼\'}">展开更多（' + hidden.length + '条）▼</div>';
      repliesHtml += '<div style="display:none">';
      repliesHtml += hidden.map(r => renderReply(r, i, replies, item)).join('');
      repliesHtml += '</div>';
      repliesHtml += visible.map(r => renderReply(r, i, replies, item)).join('');
    } else {
      repliesHtml = replies.map(r => renderReply(r, i, replies, item)).join('');
    }
    const hintHtml = msgReplyTarget && msgReplyTarget.msgIdx === i
      ? '<div class="reply-target-hint">回复：' + escapeHtml(msgReplyTarget.text.substring(0, 15)) + '<span class="cancel-reply" onclick="cancelMsgReply()">✕</span></div>'
      : '';
    const deleteNoteHtml = item.user === User.get() ? '<span class="note-delete" onclick="event.stopPropagation();deleteMessage(' + i + ')">×</span>' : '';
    return '<div class="note ' + color + '" style="' + animStyle + '--rotate:' + rotate + 'deg;transform:rotate(' + rotate + 'deg)">' +
      '<span class="note-pin">📌</span>' + deleteNoteHtml +
      '<div class="note-text">' + escapeHtml(item.text) + '</div>' +
      '<div class="note-time">' + (item.user === 'bingbing' ? '🧊冰冰宝宝' : '👨‍🍳家希') + ' · ' + formatTime(item.time) + '</div>' +
      '<div class="note-replies">' + repliesHtml + hintHtml +
        '<div class="note-reply-input">' +
          '<input id="reply-input-' + i + '" placeholder="回复~" onkeydown="if(event.key===\'Enter\')replyTo(' + i + ')">' +
          '<button onclick="replyTo(' + i + ')">➤</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function getMsgQuoteHtml(replyToId, replies, msg) {
  const orig = replies.find(r => String(r.id) === String(replyToId));
  if (orig) {
    const name = orig.user === 'bingbing' ? '🧊冰冰' : '张笨笨';
    const short = orig.text.length > 15 ? orig.text.substring(0, 15) + '...' : orig.text;
    return '<div class="reply-quote">' + name + '：' + escapeHtml(short) + '</div>';
  }
  return '';
}

function setMsgReplyTarget(msgIdx, replyId, el) {
  const fullText = el.textContent.trim();
  msgReplyTarget = { msgIdx: msgIdx, replyId: replyId, text: fullText };
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  renderMessages();
  board.scrollTop = scrollTop;
  const input = document.getElementById('reply-input-' + msgIdx);
  if (input) input.focus();
}

function cancelMsgReply() {
  msgReplyTarget = null;
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  renderMessages();
  board.scrollTop = scrollTop;
}

function rerenderQuiet() {
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  renderMessages();
  board.scrollTop = scrollTop;
}

async function addMessage() {
  if (User.isViewMode()) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  const item = await DB.insert('messages', { text: text, time: Date.now() });
  if (item) {
    messages.unshift(item);
    renderMessages();
  }
  checkAchievements('message');
  trackInteraction('message');
  addUnread('message');
  sendNotification('💌🧊🧊留言：' + text);
}

function formatTime(ts) {
  const d = new Date(ts);
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addMessage();
});

const SB_URL = 'https://ovjlremcavbqkcnejvit.supabase.co';
const SB_KEY = 'sb_publishable_jckCjiypg2K_1YFRam5bDw_3qv4ESS8';

async function loadMessages() {
  messages = await DB.getAll('messages', 'time.desc');
  const res = await fetch(SB_URL + '/rest/v1/replies?target_table=eq.messages&order=time.asc', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  const allReplies = res.ok ? await res.json() : [];
  messages.forEach(m => {
    m._replies = allReplies.filter(r => r.target_id === m.id);
  });
  renderMessages();
}

async function deleteMessage(i) {
  const msg = messages[i];
  if (!msg || msg.user !== User.get()) return;
  await DB.delete('messages', msg.id);
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  await loadMessages();
  board.scrollTop = scrollTop;
}

async function deleteReply(replyId) {
  await fetch(SB_URL + '/rest/v1/replies?id=eq.' + replyId, {
    method: 'DELETE',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  await loadMessages();
  board.scrollTop = scrollTop;
}

async function replyTo(i) {
  const input = document.getElementById('reply-input-' + i);
  const text = input.value.trim();
  if (!text) return;
  const user = User.get();
  if (!user) { await showIdentityPicker(); }
  input.value = '';
  const body = { target_table: 'messages', target_id: messages[i].id, text: text, user: User.get(), time: Date.now() };
  if (msgReplyTarget && msgReplyTarget.msgIdx === i) {
    body.reply_to = msgReplyTarget.replyId;
  }
  await fetch(SB_URL + '/rest/v1/replies', {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  msgReplyTarget = null;
  trackInteraction('reply');
  addUnread('message');
  const orig = messages[i];
  const d = new Date(orig.time);
  const origTime = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0');
  sendNotification('💬 回复留言\n原留言：' + orig.text + '\n留言时间：' + origTime + '\n回复内容：' + text);
  _skipAnim = true;
  const board = document.getElementById('board');
  const scrollTop = board.scrollTop;
  await loadMessages();
  board.scrollTop = scrollTop;
}

async function init() {
  await showIdentityPicker();
  if (User.isViewMode()) {
    document.querySelector('.input-row').style.display = 'none';
  }
  loadMessages();
}
init();
</script>
<script src="tab-bar.js"></script>
</body>
</html>
