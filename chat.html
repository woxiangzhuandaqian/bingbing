<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
<title>家希小助手 - 🧊🧊的专属小馆</title>
<link rel="stylesheet" href="style.css">
<style>
body { min-height: 100vh; display: flex; flex-direction: column; background: var(--cream); }

.chat-header { text-align: center; padding: 14px 0 10px; font-size: 16px; font-weight: 600; color: var(--green-dark); }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 0 16px 140px;
  display: flex; flex-direction: column; gap: 12px;
}

.msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-break: break-word; animation: msgIn 0.3s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.msg-user { align-self: flex-end; background: var(--green); color: white; border-bottom-right-radius: 6px; }
.msg-bot { align-self: flex-start; background: white; color: var(--text); border-bottom-left-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }

.msg-loading { align-self: flex-start; background: white; padding: 14px 18px; border-radius: 18px; border-bottom-left-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); display: flex; gap: 4px; align-items: center; }
.dot { width: 7px; height: 7px; background: #ccc; border-radius: 50%; animation: bounce 1.4s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

.chat-input-area { position: fixed; bottom: 56px; left: 0; width: 100%; padding: 12px 16px; background: white; border-top: 1px solid rgba(0,0,0,0.06); display: flex; gap: 10px; box-sizing: border-box; z-index: 50; }
.chat-input { flex: 1; padding: 10px 16px; border: 1.5px solid #e0e0e0; border-radius: 22px; font-size: 14px; outline: none; }
.chat-input:focus { border-color: var(--green); }
.chat-send { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--green); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.chat-send:active { transform: scale(0.9); }
.chat-send:disabled { background: #ccc; }
</style>
</head>
<body>

<div class="chat-header">💬 家希小助手</div>
<div class="chat-messages" id="messages">
  <div class="msg msg-bot">嘿🧊🧊~ 想我了吗？今天想吃什么，跟我说就行，御厨随时待命 👨‍🍳</div>
</div>

<div class="chat-input-area">
  <input class="chat-input" id="chat-input" placeholder="跟家希说点什么~" maxlength="200">
  <button class="chat-send" id="chat-send" onclick="sendMessage()">↑</button>
</div>

<script src="app.js?v=5"></script>
<script src="supabase.js"></script>
<script>
const AGENT_API = 'https://agentapi.baidu.com/assistant/conversation';
const APP_ID = 'a75DgOHChJYhYKphmBmf3lFTNG8biNLb';
const SECRET_KEY = 'wq1Nh7e0Q45k6YuRBDNki4wDWcrkTITp';

let threadId = '';
let isSending = false;

function getOpenId() {
  let id = localStorage.getItem('bingbing_chat_openid');
  if (!id) {
    id = 'user_' + Math.random().toString(36).slice(2, 12);
    localStorage.setItem('bingbing_chat_openid', id);
  }
  return id;
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
  return div;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'msg-loading';
  div.id = 'loading';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('messages').appendChild(div);
  scrollToBottom();
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage(text, 'user');
  isSending = true;
  document.getElementById('chat-send').disabled = true;
  showLoading();

  try {
    const body = {
      message: {
        content: { type: 'text', value: { showText: text } }
      },
      source: APP_ID,
      from: 'openapi',
      openId: getOpenId()
    };
    if (threadId) body.threadId = threadId;

    const res = await fetch(AGENT_API + '?appId=' + APP_ID + '&secretKey=' + SECRET_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    hideLoading();
    const botMsg = addMessage('', 'bot');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        try {
          const json = JSON.parse(line.slice(5));
          if (json.status === 0 && json.data?.message) {
            threadId = json.data.message.threadId || threadId;
            const contents = json.data.message.content || [];
            for (const c of contents) {
              if (c.dataType === 'markdown' && c.data?.text) {
                fullText += c.data.text;
                botMsg.textContent = fullText;
                scrollToBottom();
              }
            }
          }
        } catch (e) {}
      }
    }

    if (!fullText) botMsg.textContent = '嗯嗯~';
  } catch (e) {
    hideLoading();
    addMessage('网络好像不太好，等一下再试试~', 'bot');
  }

  isSending = false;
  document.getElementById('chat-send').disabled = false;
}

document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});
</script>
<script src="tab-bar.js"></script>
</body>
</html>
